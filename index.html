<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Modern Kart Tasarımı</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Ödev: Modern Kart Tasarımı</h1>

<!-- GRADIENT ARKA PLAN KUTUSU -->
<div class="background-box">

    <div class="cards-container">

        <!-- CSS -->
        <div class="card">
            <img src="css-logo.png">
            <h3>Modern CSS Teknikleri</h3>
            <p>Kullanıcı arayüzleri için modern stiller.</p>
            <div class="bottom">
                <span>₺299</span>
                <button>Detay</button>
            </div>
        </div>

        <!-- JS -->
        <div class="card">
            <img src="js-logo.jpg">
            <h3>JavaScript ile Dinamik</h3>
            <p>Web sitelerine etkileşim kazandırır.</p>
            <div class="bottom">
                <span>₺399</span>
                <button>Detay</button>
            </div>
        </div>

        <!-- UX -->
        <div class="card">
            <img src="ux-logo.jpg">
            <h3>Kullanıcı Deneyimi</h3>
            <p>UX tasarımı ve kullanıcı odaklılık.</p>
            <div class="bottom">
                <span>₺249</span>
                <button>Detay</button>
            </div>
        </div>

    </div>

</div>

</body>
</html>
